version: '3.9'

# ══════════════════════════════════════════════════════════════
#  FinWise AI Agent — Local Development Environment
#
#  Start:   docker compose up -d
#  Stop:    docker compose down
#  Logs:    docker compose logs -f finwise-db
#  Reset:   docker compose down -v && docker compose up -d
# ══════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL + pgvector ──────────────────────────────────
  finwise-db:
    image: pgvector/pgvector:pg16
    container_name: finwise-db
    environment:
      POSTGRES_DB: finwise
      POSTGRES_USER: finwise
      POSTGRES_PASSWORD: finwise
    ports:
      - "5432:5432"
    volumes:
      - finwise-db-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finwise -d finwise"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── pgAdmin (optional DB GUI) ──────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: finwise-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@finwise.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      finwise-db:
        condition: service_healthy
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    restart: unless-stopped
    profiles:
      - debug  # Only starts with: docker compose --profile debug up

  # ── Mailhog (local email capture for notifications) ────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: finwise-mailhog
    ports:
      - "1025:1025"  # SMTP port
      - "8025:8025"  # Web UI (view captured emails)
    restart: unless-stopped
    profiles:
      - debug

volumes:
  finwise-db-data:
  pgadmin-data:
